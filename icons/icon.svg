      <stop offset="0%" style="stop-color:#1A0F0A"/>
      <stop offset="100%" style="stop-color:#140B07"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
