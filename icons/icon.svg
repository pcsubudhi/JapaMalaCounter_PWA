  <circle cx="96" cy="256" r="18" fill="url(#gold)" opacity="0.8"/>
  <circle cx="140" cy="332" r="18" fill="url(#gold)" opacity="0.7"/>
  <circle cx="256" cy="416" r="18" fill="url(#gold)" opacity="0.6"/>
  <circle cx="372" cy="332" r="18" fill="url(#gold)" opacity="0.7"/>
  <circle cx="416" cy="256" r="18" fill="url(#gold)" opacity="0.8"/>
  <circle cx="372" cy="180" r="18" fill="url(#gold)" opacity="0.9"/>
  <!-- Center text -->
  <text x="256" y="280" text-anchor="middle" font-family="serif" font-size="100" font-weight="bold" fill="url(#gold)">108</text>
